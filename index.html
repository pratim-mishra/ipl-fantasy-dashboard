<script>

const SHEET_ID = '1d0vJWMrF3BFom02mBAzaYZEsx8qUq0wEEw9F64zzN8s';

const GAME_TOTAL_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Game_Total`;
const C_VC_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=C_VC`;

let games = [];
let teams = [];
let top5 = [];

let pointsData = {};
let subsData = {};
let playersData = {};
let captainData = {};
let viceData = {};
let combinedData = {};

async function fetchCSV(url) {
    const response = await fetch(url);
    const text = await response.text();

    return text
        .trim()
        .split('\n')
        .map(row => row.split(','));
}

function cumulativeArray(arr) {
    let total = 0;
    return arr.map(x => total += Number(x || 0));
}

function extractGameColumns(headers, suffix) {

        const captain = captainCols.map(c => Number(row[c.index] || 0));
        const vice = viceCols.map(c => Number(row[c.index] || 0));

        captainData[team] = captain;
        viceData[team] = vice;
        combinedData[team] = captain.map((v, idx) => v + vice[idx]);
    }

    calculateTop5();
    createTeamCheckboxes();
    updateCharts();

    document.getElementById('loading').style.display = 'none';
}

function calculateTop5() {

    const totals = [];

    teams.forEach(team => {
        const finalScore = pointsData[team][pointsData[team].length - 1] || 0;

        totals.push({
            team,
            score: finalScore
        });
    });

    totals.sort((a, b) => b.score - a.score);

    top5 = totals.slice(0, 5).map(x => x.team);
}

function createTeamCheckboxes() {

    const container = document.getElementById('teamContainer');

    teams.forEach(team => {

        const label = document.createElement('label');

        label.innerHTML = `
            <input type="checkbox"
                   class="team-checkbox"
                   value="${team}"
                   checked
                   onchange="updateCharts()">
            ${team}
        `;

        container.appendChild(label);
    });
}

function getSelectedTeams() {

    return Array.from(
        document.querySelectorAll('.team-checkbox:checked')
    ).map(cb => cb.value);
}

function selectAllTeams() {

    document.querySelectorAll('.team-checkbox').forEach(cb => {
        cb.checked = true;
    });

    updateCharts();
}

function selectTop5() {

        legend: {
            orientation: 'h'
        }
    });
}

function updateCharts() {

    const selectedTeams = getSelectedTeams();

    // Points
    renderLineChart(
        'pointsChart',
        'Cumulative Total Points',
        'Points',
        selectedTeams.map(team =>
            createLineTrace(team, pointsData[team])
        )
    );

    // Subs
    renderLineChart(
        'subsChart',
        'Cumulative Total Subs Used',
        'Subs',
        selectedTeams.map(team =>
            createLineTrace(team, subsData[team])
        )
    );

    // Players
    renderLineChart(
        'playersChart',
        'Players Played Per Game',
        'Players',
        selectedTeams.map(team =>
            createLineTrace(team, playersData[team])
        )
    );

    // Grouped bar
    Plotly.newPlot(
        'barChart',

        selectedTeams.map(team =>
            createBarTrace(team, playersData[team])
        ),

        {
            title: 'Exact Per-Game Player Comparison',

            barmode: 'group',

            xaxis: {
                title: 'Games'
            },

            yaxis: {
                title: 'Players'
            },

            height: 600
        }
    );

    // Captain
    renderLineChart(
        'captainChart',
        'Captain Points Per Game',
        'Captain Points',
        selectedTeams.map(team =>
            createLineTrace(team, captainData[team])
        )
    );

    // Vice Captain
    renderLineChart(
        'viceChart',
        'Vice Captain Points Per Game',
        'Vice Captain Points',
        selectedTeams.map(team =>
            createLineTrace(team, viceData[team])
        )
    );

    // Combined
    renderLineChart(
        'combinedChart',
        'Captain + Vice Captain Combined Points',
        'Combined Points',
        selectedTeams.map(team =>
            createLineTrace(team, combinedData[team])
        )
    );
}

loadData();

</script>
