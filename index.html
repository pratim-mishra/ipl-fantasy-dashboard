<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>IPL Fantasy 2026 Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

h1,h2{
    text-align:center;
}

.panel{
    background:white;
    padding:18px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.chart{
    height:550px;
}

.team-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:8px;
    margin-top:15px;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#1976d2;
    color:white;
    margin-right:10px;
}

button:hover{
    background:#1258a8;
}

.grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

</style>
</head>

<body>

<h1>IPL Fantasy 2026 Dashboard</h1>

<div class="panel">

<h3>Team Filters</h3>

<button onclick="selectAllTeams()">All Teams</button>
<button onclick="selectTop5()">Top 5 Teams</button>
<button onclick="clearTeams()">Clear Selection</button>
<button onclick="reloadDashboard()">Reload Dashboard</button>

<div id="status">Loading dashboard...</div>

<div id="teamContainer" class="team-grid"></div>

</div>

<div class="panel"><div id="pointsChart" class="chart"></div></div>
<div class="panel"><div id="subsChart" class="chart"></div></div>
<div class="panel"><div id="playersChart" class="chart"></div></div>
<div class="panel"><div id="playerBarChart" class="chart"></div></div>
<div class="panel"><div id="captainChart" class="chart"></div></div>
<div class="panel"><div id="viceChart" class="chart"></div></div>
<div class="panel"><div id="combinedChart" class="chart"></div></div>

<h2>Booster Analytics</h2>

<div class="grid2">

<div class="panel"><div id="doublePower1" class="chart"></div></div>
<div class="panel"><div id="doublePower2" class="chart"></div></div>

<div class="panel"><div id="foreignStars1" class="chart"></div></div>
<div class="panel"><div id="foreignStars2" class="chart"></div></div>

<div class="panel"><div id="indianWarriors1" class="chart"></div></div>
<div class="panel"><div id="indianWarriors2" class="chart"></div></div>

<div class="panel"><div id="tripleCaptain1" class="chart"></div></div>
<div class="panel"><div id="tripleCaptain2" class="chart"></div></div>

<div class="panel"><div id="freeHit" class="chart"></div></div>
<div class="panel"><div id="wildCard" class="chart"></div></div>

</div>

<script>

const SHEET_ID = '1d0vJWMrF3BFom02mBAzaYZEsx8qUq0wEEw9F64zzN8s';

const GAME_TOTAL_URL =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Game_Total`;

const CVC_URL =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=C_VC`;

const OVERALL_URL =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Overall`;

let games = [];
let teams = [];
let top5 = [];

let pointsData = {};
let subsData = {};
let playersData = {};
let captainData = {};
let viceData = {};
let combinedData = {};

let boosterData = {};

const boosterChartConfig = {

    'Double Power':[
        {id:'doublePower1', label:'Double Power 1', color:'#1f77b4'},
        {id:'doublePower2', label:'Double Power 2', color:'#4fa3ff'}
    ],

    'Foreign Stars':[
        {id:'foreignStars1', label:'Foreign Stars 1', color:'#ff7f0e'},
        {id:'foreignStars2', label:'Foreign Stars 2', color:'#ffb266'}
    ],

    'Indian Warriors':[
        {id:'indianWarriors1', label:'Indian Warriors 1', color:'#2ca02c'},
        {id:'indianWarriors2', label:'Indian Warriors 2', color:'#7bd67b'}
    ],

    'Triple Captain':[
        {id:'tripleCaptain1', label:'Triple Captain 1', color:'#d62728'},
        {id:'tripleCaptain2', label:'Triple Captain 2', color:'#ff7a7a'}
    ],

    'Free Hit':[
        {id:'freeHit', label:'Free Hit', color:'#9467bd'}
    ],

    'Wild Card':[
        {id:'wildCard', label:'Wild Card', color:'#8c564b'}
    ]
};

async function fetchCSV(url){

    const response = await fetch(url);

    if(!response.ok){
        throw new Error('Failed to fetch Google Sheet');
    }

    const text = await response.text();

    return Papa.parse(text.trim(), {
        skipEmptyLines:true
    }).data;
}

function cumulative(arr){

    let total = 0;

    return arr.map(v => total += Number(v || 0));
}

function extractColumns(headers, keyword){

    const cols = [];

    headers.forEach((h, idx) => {

        if(h && h.includes(keyword)){

            const match = h.match(/G(\d+)/);

            if(match){

                cols.push({
                    game:Number(match[1]),
                    index:idx
                });
            }
        }
    });

    cols.sort((a,b)=>a.game-b.game);

    return cols;
}

function safe(v){

    const n = parseFloat(v);

    return isNaN(n) ? 0 : n;
}

function initializeBoosterData(){

    Object.keys(boosterChartConfig)
        .forEach(name => {
            boosterData[name] = {};
        });
}

function parseBoosterString(team, text){

    if(!text) return;

    const entries = text.split('|');

    entries.forEach(entry => {

        const match =
            entry.trim().match(/(.+?)\s*\((.+)\)/);

        if(!match) return;

        const booster = match[1].trim();

        if(!boosterData[booster]){
            boosterData[booster] = {};
        }

        if(!boosterData[booster][team]){
            boosterData[booster][team] = [];
        }

        const gameEntries = match[2].split(',');

        gameEntries.forEach(g => {

            const gm =
                g.trim().match(/(G\d+)\s*:\s*([\d\.]+)/);

            if(!gm) return;

            boosterData[booster][team].push({
                game:gm[1],
                points:parseFloat(gm[2])
            });
        });
    });
}

function lineTrace(team, values){

    return {
        x:games,
        y:values,
        mode:'lines+markers',
        name:team,
        line:{
            shape:'spline',
            smoothing:1.2,
            width:3
        },
        marker:{
            size:7
        }
    };
}

function renderLineChart(id, title, yTitle, traces){

    Plotly.react(id, traces, {

        title,

        hovermode:'x unified',

        xaxis:{
            title:'Games'
        },

        yaxis:{
            title:yTitle
        },

        legend:{
            orientation:'h'
        }

    }, {responsive:true});
}

function createTeamCheckboxes(){

    const container = document.getElementById('teamContainer');

    container.innerHTML = '';

    teams.forEach(team => {

        const label = document.createElement('label');

        label.innerHTML = `
            <input type="checkbox"
                   class="team-checkbox"
                   value="${team}"
                   checked
                   onchange="updateCharts()">
            ${team}
        `;

        container.appendChild(label);
    });
}

function getSelectedTeams(){

    return [...document.querySelectorAll('.team-checkbox:checked')]
        .map(cb => cb.value);
}

function selectAllTeams(){

    document.querySelectorAll('.team-checkbox')
        .forEach(cb => cb.checked = true);

    updateCharts();
}

function selectTop5(){

    document.querySelectorAll('.team-checkbox')
        .forEach(cb => {
            cb.checked = top5.includes(cb.value);
        });

    updateCharts();
}

function clearTeams(){

    document.querySelectorAll('.team-checkbox')
        .forEach(cb => cb.checked = false);

    updateCharts();
}

function reloadDashboard(){
    loadDashboard();
}

function updateCharts(){

    const selected = getSelectedTeams();

    renderLineChart(
        'pointsChart',
        'Cumulative Total Points',
        'Points',
        selected.map(t => lineTrace(t, pointsData[t] || []))
    );

    renderLineChart(
        'subsChart',
        'Cumulative Subs Used',
        'Subs Used',
        selected.map(t => lineTrace(t, subsData[t] || []))
    );

    renderLineChart(
        'playersChart',
        'Players Played Per Game',
        'Players',
        selected.map(t => lineTrace(t, playersData[t] || []))
    );

    Plotly.react(
        'playerBarChart',
        selected.map(t => ({
            x:games,
            y:playersData[t] || [],
            type:'bar',
            name:t
        })),
        {
            title:'Exact Per-Game Player Comparison',
            barmode:'group'
        },
        {responsive:true}
    );

    renderLineChart(
        'captainChart',
        'Captain Points',
        'Captain Points',
        selected.map(t => lineTrace(t, captainData[t] || []))
    );

    renderLineChart(
        'viceChart',
        'Vice Captain Points',
        'VC Points',
        selected.map(t => lineTrace(t, viceData[t] || []))
    );

    renderLineChart(
        'combinedChart',
        'Captain + Vice Captain Combined',
        'Combined Points',
        selected.map(t => lineTrace(t, combinedData[t] || []))
    );
}

function createSingleBoosterChart(config, teams, values, games){

    const teamColors = [
        '#1f77b4',
        '#ff7f0e',
        '#2ca02c',
        '#d62728',
        '#9467bd',
        '#8c564b',
        '#e377c2',
        '#7f7f7f',
        '#bcbd22',
        '#17becf',
        '#393b79'
    ];

    Plotly.react(

        config.id,

        [{

            x: teams.map(t => String(t)),

            y: values,

            type:'bar',

            marker:{
                color: teams.map((_, idx) =>
                    teamColors[idx % teamColors.length]
                )
            }

            hovertemplate:
                '<b>%{x}</b><br>' +
                'Game: %{customdata}<br>' +
                'Points: %{y}<extra></extra>',

            customdata: games

        }],

        {
            title:config.label,

            xaxis:{
                title:'Teams',
                type:'category',
                tickangle:-35,
                automargin:true
            },
        
            yaxis:{
                title:'Booster Points'
            },
        
            margin:{
                b:150
            }
        },

        {responsive:true}
    );
}

function renderBoosterCharts(){

    Object.keys(boosterChartConfig)
        .forEach(booster => {

            const configs = boosterChartConfig[booster];

            configs.forEach((cfg, index) => {

                const teamsArr = [];
                const values = [];
                const gamesArr = [];

                teams.forEach(team => {
                        const entries = boosterData[booster][team];

                        const item = entries[index];

                        if(
                            !team ||
                            !isNaN(team)
                        ){
                            return;
                        }
                        
                        teamsArr.push(String(team));

                        if(item){
                            values.push(item.points);
                            gamesArr.push(item.game);
                        }else{
                            values.push(0);
                            gamesArr.push('-');
                        }
                    });

                createSingleBoosterChart(
                    cfg,
                    teamsArr,
                    values,
                    gamesArr
                );
            });
        });
}

async function loadDashboard(){

    try{

        document.getElementById('status')
            .innerText = 'Loading Google Sheet data...';

        initializeBoosterData();

        const gameCsv = await fetchCSV(GAME_TOTAL_URL);
        const cvcCsv = await fetchCSV(CVC_URL);
        const overallCsv = await fetchCSV(OVERALL_URL);

        const gameHeaders = gameCsv[0];
        const cvcHeaders = cvcCsv[0];
        const overallHeaders = overallCsv[0];

        const totalCols = extractColumns(gameHeaders, 'Total');
        const subsCols = extractColumns(gameHeaders, 'Subs');
        const playerCols = extractColumns(gameHeaders, 'Players');

        const captainCols = extractColumns(cvcHeaders, ' C');
        const viceCols = extractColumns(cvcHeaders, 'VC');

        const boosterCol =
            overallHeaders.findIndex(h => h === 'Booster');
        
        const teamCol =
            overallHeaders.findIndex(h =>
                h.toLowerCase().includes('team')
            );
        
        for(let i=1;i<overallCsv.length;i++){
        
            const row = overallCsv[i];
        
            const team = row[teamCol];
        
            if(!team) continue;
        
            parseBoosterString(team, row[boosterCol]);
        }

        games = totalCols.map(c => `G${c.game}`);

        pointsData = {};
        subsData = {};
        playersData = {};
        captainData = {};
        viceData = {};
        combinedData = {};
        teams = [];

        for(let i=1;i<gameCsv.length;i++){

            const row = gameCsv[i];
            const team = row[0];

            if(!team) continue;

            teams.push(team);

            pointsData[team] = cumulative(
                totalCols.map(c => safe(row[c.index]))
            );

            subsData[team] = cumulative(
                subsCols.map(c => safe(row[c.index]))
            );

            playersData[team] =
                playerCols.map(c => safe(row[c.index]));
        }

        for(let i=1;i<cvcCsv.length;i++){

            const row = cvcCsv[i];
            const team = row[0];

            if(!team) continue;

            captainData[team] =
                captainCols.map(c => safe(row[c.index]));

            viceData[team] =
                viceCols.map(c => safe(row[c.index]));

            combinedData[team] =
                captainData[team].map((v, idx) =>
                    v + viceData[team][idx]
                );
        }

        for(let i=1;i<overallCsv.length;i++){

            const row = overallCsv[i];
            const team = row[0];

            if(!team) continue;

            parseBoosterString(team, row[boosterCol]);
        }

        top5 = Object.keys(pointsData)
            .sort((a,b)=>(pointsData[b].slice(-1)[0] || 0)
            - (pointsData[a].slice(-1)[0] || 0))
            .slice(0,5);

        createTeamCheckboxes();

        updateCharts();

        renderBoosterCharts();

        document.getElementById('status')
            .innerText = 'Dashboard loaded successfully';

    }catch(err){

        console.error(err);

        document.getElementById('status')
            .innerText =
                'Failed to load dashboard data';
    }
}

loadDashboard();

</script>

</body>
</html>
