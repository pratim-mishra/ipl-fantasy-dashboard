<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>IPL Fantasy 2026 Dashboard</title>

<script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    margin:0;
    padding:20px;
}

h1,h2{
    text-align:center;
}

.panel{
    background:white;
    padding:18px;
    border-radius:12px;
    margin-bottom:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.chart{
    height:550px;
}

.team-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:8px;
    margin-top:15px;
}

button{
    padding:10px 14px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#1976d2;
    color:white;
    margin-right:10px;
}

button:hover{
    background:#1258a8;
}

.grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}


.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:#111827;color:#fff;padding:16px;border-radius:12px;text-align:center}
.theme-toggle{position:fixed;top:10px;right:10px;z-index:9999}
body.dark{background:#0f172a;color:#e5e7eb}
body.dark .panel{background:#1e293b;color:#fff}
body.dark button{background:#334155}
@media(max-width:768px){.chart{height:350px!important}.grid2{grid-template-columns:1fr!important}}
</style>

</head>

<body>

<h1>IPL Fantasy 2026 Dashboard</h1>

<button class="theme-toggle" onclick="toggleTheme()">🌙/☀️</button>
<div class="kpi-grid">
<div class="kpi-card"><h3>🏆 Leader</h3><div id="kpiLeader">-</div></div>
<div class="kpi-card"><h3>📈 Highest Points</h3><div id="kpiPoints">-</div></div>
<div class="kpi-card"><h3>⚡ Double Power</h3><div id="kpiDP">-</div></div>
<div class="kpi-card"><h3>⭐ Foreign Stars</h3><div id="kpiFS">-</div></div>
<div class="kpi-card"><h3>🔥 Indian Warriors</h3><div id="kpiIW">-</div></div>
<div class="kpi-card"><h3>👑 Triple Captain</h3><div id="kpiTC">-</div></div>
<div class="kpi-card"><h3>🎯 Free Hit</h3><div id="kpiFH">-</div></div>
<div class="kpi-card"><h3>🎲 Wild Card</h3><div id="kpiWC">-</div></div>
</div>

<div class="panel">

<h3>Team Filters</h3>

<button onclick="selectAllTeams()">All Teams</button>
<button onclick="selectTop5()">Top 5 Teams</button>
<button onclick="clearTeams()">Clear Selection</button>
<button onclick="reloadDashboard()">Reload Dashboard</button>

<div id="status">Loading dashboard...</div>

<div id="teamContainer" class="team-grid"></div>

</div>

<div class="panel"><div id="pointsChart" class="chart"></div></div>
<div class="panel"><div id="subsChart" class="chart"></div></div>
<div class="panel"><div id="playersChart" class="chart"></div></div>
<div class="panel"><div id="playerBarChart" class="chart"></div></div>
<div class="panel"><div id="captainChart" class="chart"></div></div>
<div class="panel"><div id="viceChart" class="chart"></div></div>
<div class="panel"><div id="combinedChart" class="chart"></div></div>

<h2>Booster Analytics</h2>

<div class="grid2">

<div class="panel"><div id="doublePowerChart" class="chart"></div></div>
<div class="panel"><div id="foreignStarsChart" class="chart"></div></div>
<div class="panel"><div id="indianWarriorsChart" class="chart"></div></div>
<div class="panel"><div id="tripleCaptainChart" class="chart"></div></div>
<div class="panel"><div id="freeHitChart" class="chart"></div></div>
<div class="panel"><div id="wildCardChart" class="chart"></div></div>

</div>

<script>

const SHEET_ID =
'1d0vJWMrF3BFom02mBAzaYZEsx8qUq0wEEw9F64zzN8s';

const GAME_TOTAL_URL =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Game_Total`;

const CVC_URL =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=C_VC`;

const OVERALL_URL =
`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Overall`;

let games = [];
let teams = [];
let top5 = [];

let pointsData = {};
let subsData = {};
let playersData = {};
let captainData = {};
let viceData = {};
let combinedData = {};

let boosterData = {};

const boosterChartConfig = {
'Double Power':[{id:'doublePowerChart', label:'Double Power'}],
'Foreign Stars':[{id:'foreignStarsChart', label:'Foreign Stars'}],
'Indian Warriors':[{id:'indianWarriorsChart', label:'Indian Warriors'}],
'Triple Captain':[{id:'tripleCaptainChart', label:'Triple Captain'}],
'Free Hit':[{id:'freeHitChart', label:'Free Hit'}],
'Wild Card':[{id:'wildCardChart', label:'Wild Card'}]
};

const teamColors = [
    '#1f77b4',
    '#ff7f0e',
    '#2ca02c',
    '#d62728',
    '#9467bd',
    '#8c564b',
    '#e377c2',
    '#7f7f7f',
    '#bcbd22',
    '#17becf',
    '#393b79'
];

const TEAM_COLORS = {
    "RoyalRajRinhos RRXI":"#1f77b4",
    "Hell Dhurandars":"#ff7f0e",
    "Dada Dragons":"#2ca02c",
    "Dhurundhar":"#d62728",
    "RDX":"#9467bd",
    "Dadagiri":"#8c564b",
    "Blue Scrappers":"#e377c2",
    "Maybe 11":"#7f7f7f",
    "Shubham's Titans":"#bcbd22",
    "Original admin 11":"#17becf",
    "Namma RCB 11":"#393b79"
};

async function fetchCSV(url){

    const response = await fetch(url);

    if(!response.ok){
        throw new Error('Failed to fetch Google Sheet');
    }

    const text = await response.text();

    return Papa.parse(text.trim(), {
        skipEmptyLines:true
    }).data;
}

function cumulative(arr){

    let total = 0;

    return arr.map(v => total += Number(v || 0));
}

function extractColumns(headers, keyword){

    const cols = [];

    headers.forEach((h, idx) => {

        if(h && h.includes(keyword)){

            const match = h.match(/G(\d+)/);

            if(match){

                cols.push({
                    game:Number(match[1]),
                    index:idx
                });
            }
        }
    });

    cols.sort((a,b)=>a.game-b.game);

    return cols;
}

function safe(v){

    const n = parseFloat(v);

    return isNaN(n) ? 0 : n;
}

function initializeBoosterData(){

    Object.keys(boosterChartConfig)
        .forEach(name => {
            boosterData[name] = {};
        });
}

function parseBoosterString(team, text){

    if(!text) return;

    const entries = text.split('|');

    entries.forEach(entry => {

        const match =
            entry.trim().match(/(.+?)\s*\((.+)\)/);

        if(!match) return;

        const booster = match[1].trim();

        if(!boosterData[booster]){
            boosterData[booster] = {};
        }

        if(!boosterData[booster][team]){
            boosterData[booster][team] = [];
        }

        const gameEntries = match[2].split(',');

        gameEntries.forEach(g => {

            const gm =
                g.trim().match(/(G\d+)\s*:\s*([\d\.]+)/);

            if(!gm) return;

            boosterData[booster][team].push({
                game:gm[1],
                points:parseFloat(gm[2])
            });
        });
    });
}

function lineTrace(team, values){

    return {
        x:games,
        y:values,
        mode:'lines+markers',
        name:team,
        line:{
            shape:'spline',
            smoothing:1.2,
            width:3
        },
        marker:{
            size:7
        }
    };
}

function renderLineChart(id, title, yTitle, traces){

    Plotly.react(id, traces, {

        title,
        hovermode:'x unified',

        xaxis:{
            title:'Games'
        },

        yaxis:{
            title:yTitle
        },

        legend:{
            orientation:'h'
        }

    }, {responsive:true});
}

function createTeamCheckboxes(){

    const container =
        document.getElementById('teamContainer');

    container.innerHTML = '';

    teams.forEach(team => {

        const label =
            document.createElement('label');

        label.innerHTML = `
            <input type="checkbox"
                   class="team-checkbox"
                   value="${team}"
                   checked
                   onchange="updateCharts()">
            ${team}
        `;

        container.appendChild(label);
    });
}

function getSelectedTeams(){

    return [...document.querySelectorAll(
        '.team-checkbox:checked'
    )].map(cb => cb.value);
}

function selectAllTeams(){

    document.querySelectorAll('.team-checkbox')
        .forEach(cb => cb.checked = true);

    updateCharts();
}

function selectTop5(){

    document.querySelectorAll('.team-checkbox')
        .forEach(cb => {
            cb.checked = top5.includes(cb.value);
        });

    updateCharts();
}

function clearTeams(){

    document.querySelectorAll('.team-checkbox')
        .forEach(cb => cb.checked = false);

    updateCharts();
}

function reloadDashboard(){ loadDashboard(); }

function updateCharts(){

    const selected = getSelectedTeams();

    renderLineChart(
        'pointsChart',
        'Cumulative Total Points',
        'Points',
        selected.map(t => lineTrace(t, pointsData[t] || []))
    );

    renderLineChart(
        'subsChart',
        'Cumulative Subs Used',
        'Subs Used',
        selected.map(t => lineTrace(t, subsData[t] || []))
    );

    renderLineChart(
        'playersChart',
        'Players Played Per Game',
        'Players',
        selected.map(t => lineTrace(t, playersData[t] || []))
    );

    Plotly.react(
        'playerBarChart',
        selected.map(t => ({
            x:games,
            y:playersData[t] || [],
            type:'bar',
            name:t
        })),
        {
            title:'Exact Per-Game Player Comparison',
            barmode:'group'
        },
        {responsive:true}
    );

    renderLineChart(
        'captainChart',
        'Captain Points',
        'Captain Points',
        selected.map(t => lineTrace(t, captainData[t] || []))
    );

    renderLineChart(
        'viceChart',
        'Vice Captain Points',
        'VC Points',
        selected.map(t => lineTrace(t, viceData[t] || []))
    );

    renderLineChart(
        'combinedChart',
        'Captain + Vice Captain Combined',
        'Combined Points',
        selected.map(t => lineTrace(t, combinedData[t] || []))
    );
}

function createSingleBoosterChart(
    config,
    teamsArr,
    values,
    gamesArr
){

    Plotly.react(

        config.id,

        [{

            x:teamsArr,

            y:values,

            type:'bar',

            marker:{
                color:teamsArr.map((_, idx)=>
                    teamColors[idx % teamColors.length]
                )
            },

            customdata:gamesArr,

            hovertemplate:
                '<b>%{x}</b><br>' +
                'Game: %{customdata}<br>' +
                'Points: %{y}<extra></extra>'

        }],

        {

            title:config.label,

            xaxis:{
                title:'Teams',
                type:'category',
                tickangle:-35,
                automargin:true
            },

            yaxis:{
                title:'Booster Points'
            },

            margin:{
                b:150
            }

        },

        {responsive:true}
    );
}

function renderBoosterCharts(){

Object.keys(boosterChartConfig).forEach(booster=>{

 const cfg = boosterChartConfig[booster][0];
 const teamsArr=[];
 const values1=[];
 const values2=[];
 const games1=[];
 const games2=[];

 teams.forEach(team=>{
   const entries = boosterData[booster]?.[team] || [];
   teamsArr.push(team);
   values1.push(entries[0]?.points || 0);
   values2.push(entries[1]?.points || 0);
   games1.push(entries[0]?.game || '-');
   games2.push(entries[1]?.game || '-');
 });

 const traces=[{
   x:teamsArr,
   y:values1,
   name:'Booster 1',
   type:'bar',
   marker:{
      color: teamsArr.map(t => TEAM_COLORS[t] || '#1f77b4')
   },
   customdata:games1,
   hovertemplate:'<b>%{x}</b><br>Game:%{customdata}<br>Points:%{y}<extra></extra>'
 }];

 if(['Double Power','Foreign Stars','Indian Warriors','Triple Captain'].includes(booster)){
   traces.push({
     x:teamsArr,
     y:values2,
     name:'Booster 2',
     type:'bar',
     marker:{
        color: teamsArr.map(t => TEAM_COLORS[t] || '#1f77b4'),
        opacity:0.75
     },
     customdata:games2,
     hovertemplate:'<b>%{x}</b><br>Game:%{customdata}<br>Points:%{y}<extra></extra>'
   });
 }

 Plotly.react(cfg.id,traces,{
   title:cfg.label,
   barmode:'group',
   xaxis:{title:'Teams',tickangle:-35},
   yaxis:{title:'Booster Points'}
 },{responsive:true});

});

}

async function loadDashboard(){

    try{

        document.getElementById('status')
            .innerText =
            'Loading Google Sheet data...';

        initializeBoosterData();

        const gameCsv =
            await fetchCSV(GAME_TOTAL_URL);

        const cvcCsv =
            await fetchCSV(CVC_URL);

        const overallCsv =
            await fetchCSV(OVERALL_URL);

        const gameHeaders = gameCsv[0];
        const cvcHeaders = cvcCsv[0];
        const overallHeaders = overallCsv[0];

        const totalCols =
            extractColumns(gameHeaders, 'Total');

        const subsCols =
            extractColumns(gameHeaders, 'Subs');

        const playerCols =
            extractColumns(gameHeaders, 'Players');

        const captainCols =
            extractColumns(cvcHeaders, ' C');

        const viceCols =
            extractColumns(cvcHeaders, 'VC');

        const boosterCol =
            overallHeaders.findIndex(
                h => h === 'Booster'
            );

        const teamCol =
            overallHeaders.findIndex(h =>
                h.toLowerCase().includes('team')
            );

        games =
            totalCols.map(c => `G${c.game}`);

        pointsData = {};
        subsData = {};
        playersData = {};
        captainData = {};
        viceData = {};
        combinedData = {};
        teams = [];

        for(let i=1;i<gameCsv.length;i++){

            const row = gameCsv[i];
            const team = row[0];

            if(!team) continue;

            teams.push(team);

            pointsData[team] =
                cumulative(
                    totalCols.map(c =>
                        safe(row[c.index])
                    )
                );

            subsData[team] =
                cumulative(
                    subsCols.map(c =>
                        safe(row[c.index])
                    )
                );

            playersData[team] =
                playerCols.map(c =>
                    safe(row[c.index])
                );
        }

        for(let i=1;i<cvcCsv.length;i++){

            const row = cvcCsv[i];
            const team = row[0];

            if(!team) continue;

            captainData[team] =
                captainCols.map(c =>
                    safe(row[c.index])
                );

            viceData[team] =
                viceCols.map(c =>
                    safe(row[c.index])
                );

            combinedData[team] =
                captainData[team].map(
                    (v, idx) =>
                    v + viceData[team][idx]
                );
        }

        for(let i=1;i<overallCsv.length;i++){

            const row = overallCsv[i];

            const team = row[teamCol];

            if(!team) continue;

            parseBoosterString(
                team,
                row[boosterCol]
            );
        }

        top5 = Object.keys(pointsData)
            .sort((a,b)=>
                (pointsData[b].slice(-1)[0] || 0)
                -
                (pointsData[a].slice(-1)[0] || 0)
            )
            .slice(0,5);

        createTeamCheckboxes();

        updateCharts();

        renderBoosterCharts();
        updateKPIs();

        document.getElementById('status')
            .innerText =
            'Dashboard loaded successfully';

    }catch(err){

        console.error(err);

        document.getElementById('status')
            .innerText =
            'Failed to load dashboard data';
    }
}


function buildMobileTabs(){

    if(window.innerWidth > 768) return;

    if(document.getElementById('mobileTabs')){
        return;
    }

    const tabs = document.createElement('div');
    tabs.id = 'mobileTabs';
    tabs.style.cssText='position:sticky;top:0;background:#111827;padding:10px;z-index:1000';

    tabs.innerHTML = `
        <button onclick="showSection('pointsChart')">Points</button>
        <button onclick="showSection('subsChart')">Subs</button>
        <button onclick="showSection('boosters')">Boosters</button>
        <button onclick="showAllSections()">All</button>
    `;

    document.body.insertBefore(tabs, document.body.firstChild);
}

function showAllSections(){
 document.querySelectorAll('.panel').forEach(p=>p.style.display='block');
}

function showSection(section){

    document.querySelectorAll('.panel').forEach(panel => {
        panel.style.display = 'none';
    });

    if(section === 'pointsChart'){
        document.getElementById('pointsChart').closest('.panel').style.display='block';
    }
    else if(section === 'subsChart'){
        document.getElementById('subsChart').closest('.panel').style.display='block';
    }
    else if(section === 'boosters'){
        [
            'doublePowerChart','foreignStarsChart','indianWarriorsChart',
            'tripleCaptainChart','freeHitChart','wildCardChart'
        ].forEach(id=>{
            const c=document.getElementById(id);
            if(c) c.closest('.panel').style.display='block';
        });
    }
}


function toggleTheme(){
 document.body.classList.toggle('dark');
 localStorage.setItem('theme', document.body.classList.contains('dark')?'dark':'light');
}

(function(){
 if(localStorage.getItem('theme')==='dark'){
   document.body.classList.add('dark');
 }
})();

function updateKPIs(){
    document.getElementById('kpiDP')
    .innerText =
    getBestBooster('Double Power');

document.getElementById('kpiFS')
    .innerText =
    getBestBooster('Foreign Stars');

document.getElementById('kpiIW')
    .innerText =
    getBestBooster('Indian Warriors');

document.getElementById('kpiTC')
    .innerText =
    getBestBooster('Triple Captain');

document.getElementById('kpiFH')
    .innerText =
    getBestBooster('Free Hit');

document.getElementById('kpiWC')
    .innerText =
    getBestBooster('Wild Card');
}
    
function getBestBooster(boosterName){

    let bestTeam = '-';
    let bestPoints = 0;

    Object.entries(
        boosterData[boosterName] || {}
    ).forEach(([team, entries]) => {

        entries.forEach(entry => {

            if(entry.points > bestPoints){

                bestPoints = entry.points;
                bestTeam = team;

            }

        });

    });

    return `${bestTeam} (${bestPoints})`;
}

buildMobileTabs();
loadDashboard();

</script>

</body>
</html>
